<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KYA · Live API Console</title>
<style>
  :root{--bg:#07090f;--bg2:#0b0f18;--ink:#e8edf6;--dim:#8b93a7;--faint:#2a3346;
    --gold:#e9c46a;--gold-dim:#7a6a3a;--green:#39d98a;--red:#ff5470;--blu:#4895ef;--mag:#c77dff;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,sans-serif}
  a{color:var(--gold);text-decoration:none}
  .wrap{display:grid;grid-template-columns:290px 1fr;height:100vh}
  /* sidebar */
  .side{border-right:1px solid var(--faint);overflow:auto;background:#090d15}
  .side header{padding:18px 18px 12px;border-bottom:1px solid var(--faint);position:sticky;top:0;background:#090d15;z-index:2}
  .brand{font-weight:600;font-size:15px}
  .brand small{color:var(--dim);font-weight:400}
  .baseurl{margin-top:6px;font-size:11px;color:var(--dim);font-family:ui-monospace,Menlo,monospace}
  .side .grp{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);
    padding:14px 18px 6px;font-weight:600}
  .op{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;font-size:12.5px;
    border-left:2px solid transparent;transition:.12s}
  .op:hover{background:#0e1524}
  .op.sel{background:#111a2c;border-left-color:var(--gold)}
  .m{font-family:ui-monospace,Menlo,monospace;font-size:9.5px;font-weight:700;padding:2px 5px;border-radius:4px;flex:none;width:44px;text-align:center}
  .m.GET{background:#0f3024;color:var(--green)} .m.POST{background:#12263f;color:var(--blu)}
  .m.DELETE{background:#3a1420;color:var(--red)} .m.PUT{background:#2a2140;color:var(--mag)}
  .op .pth{color:var(--ink);font-family:ui-monospace,Menlo,monospace;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* main */
  .main{overflow:auto;padding:24px 30px 60px}
  .req-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .req-head .m{font-size:12px;width:auto;padding:4px 9px}
  .req-head .url{font-family:ui-monospace,Menlo,monospace;font-size:15px;color:var(--ink)}
  .desc{color:var(--dim);font-size:13px;margin:10px 0 18px;line-height:1.5;max-width:760px}
  .fields{display:grid;gap:12px;max-width:760px}
  .field label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
  .field label .tag{color:var(--gold-dim);text-transform:none;letter-spacing:0;font-size:11px}
  .field input,.field select,.field textarea{width:100%;background:#0d1220;color:var(--ink);
    border:1px solid var(--faint);border-radius:8px;padding:9px 11px;font-size:13px;font-family:ui-monospace,Menlo,monospace}
  .field textarea{min-height:96px;resize:vertical;line-height:1.5}
  .runbar{display:flex;align-items:center;gap:14px;margin:20px 0 8px;max-width:760px}
  #run{background:var(--gold);color:#1a1406;border:0;border-radius:9px;font:inherit;font-weight:700;
    font-size:14px;padding:11px 26px;cursor:pointer;transition:.15s}
  #run:hover{filter:brightness(1.07)} #run:disabled{opacity:.5;cursor:default}
  .status{font-size:13px;font-family:ui-monospace,Menlo,monospace;color:var(--dim)}
  .status b.ok{color:var(--green)} .status b.no{color:var(--red)}
  .curl{margin:14px 0;max-width:760px;background:#080b12;border:1px solid var(--faint);border-radius:8px;
    padding:11px 13px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--dim);white-space:pre-wrap;word-break:break-all}
  .curl b{color:var(--gold)}
  .resp{margin-top:8px;max-width:900px;background:#080b12;border:1px solid var(--faint);border-radius:10px;overflow:hidden}
  .resp-head{padding:8px 13px;border-bottom:1px solid var(--faint);font-size:11px;color:var(--dim);
    display:flex;gap:14px;font-family:ui-monospace,Menlo,monospace}
  pre.body{margin:0;padding:14px;font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.55;
    overflow:auto;max-height:52vh;color:var(--ink)}
  .k{color:var(--gold)} .s{color:var(--green)} .n{color:var(--blu)} .b{color:var(--mag)} .nl{color:var(--dim)}
  .hint{color:var(--dim);font-size:12px;margin-top:40px}
  .topright{position:fixed;top:16px;right:22px;font-size:12px}
</style>
</head>
<body>
<div class="topright"><a href="/city">◈ open the trust map ↗</a></div>
<div class="wrap">
  <nav class="side">
    <header>
      <div class="brand">KYA <small>· Live API Console</small></div>
      <div class="baseurl" id="baseurl">…</div>
    </header>
    <div id="oplist"></div>
  </nav>
  <main class="main" id="main">
    <div class="hint">Pick an operation on the left. Read endpoints need no auth; write
      endpoints are pre-filled with sandbox seed keys. Every call hits the real service.</div>
  </main>
</div>

<script>
const BASE=location.origin;
document.getElementById("baseurl").textContent=BASE;
const SEED={reg:"sk_seed_registrar",court:"sk_seed_court",hosp:"sk_seed_hospital",
  cor_a:"sk_seed_coroner_a",cor_b:"sk_seed_coroner_b",police:"sk_seed_police"};

// Each op: {g, m, path, desc, fields:[{k,in,def,ph,type}], body}
const OPS=[
 // ---- READ ----
 {g:"Read · core",m:"GET",path:"/verify-counterparty",desc:"THE call — a signed proceed/refuse verdict on a counterparty in a category.",
  fields:[{k:"agent_id",in:"q",def:"a-june-01"},{k:"category",in:"q",def:"financial",type:"cat"}]},
 {g:"Read · core",m:"POST",path:"/verify-batch",desc:"Screen many agents in one signed call (max 100).",
  body:'{\n  "agent_ids": ["a-ada-01","a-shadow-99","a-june-01","a-silas-01"],\n  "category": "commerce"\n}'},
 {g:"Read · core",m:"POST",path:"/verify",desc:"Validate any certificate's Ed25519 signature against the root key. Try tampering a field, then re-run.",
  body:'{ "cert": { } }',note:"paste a cert from /verify-counterparty into cert"},
 {g:"Read · core",m:"GET",path:"/certificates/{cert_id}",desc:"Re-serve a past verdict as a signed compliance receipt.",
  fields:[{k:"cert_id",in:"p",def:"c-xxxx",ph:"run a verdict first, paste its cert_id"}]},
 {g:"Read · identity",m:"GET",path:"/resolve/{agent_id}",desc:"DNS-style resolution chain: root → institution → principal → agent.",
  fields:[{k:"agent_id",in:"p",def:"a-shadow-99"}]},
 {g:"Read · identity",m:"GET",path:"/capacity/{principal_id}",desc:"Capacity verdict for a human directly.",
  fields:[{k:"principal_id",in:"p",def:"p-june-okafor"},{k:"category",in:"q",def:"financial",type:"cat"}]},
 {g:"Read · identity",m:"GET",path:"/bindings/{agent_id}",desc:"Which principal/corp an agent is authorized for.",
  fields:[{k:"agent_id",in:"p",def:"a-ada-01"}]},
 {g:"Read · town",m:"GET",path:"/health",desc:"Liveness."},
 {g:"Read · town",m:"GET",path:"/pubkey",desc:"The city constitutional root key — verify every cert against this."},
 {g:"Read · town",m:"GET",path:"/constitution",desc:"The whole law as signed JSON — generated from the code that enforces it."},
 {g:"Read · town",m:"GET",path:"/census",desc:"Anonymous town statistics."},
 {g:"Read · town",m:"GET",path:"/graph",desc:"Public node/edge map of the town (powers the trust constellation)."},
 {g:"Read · town",m:"GET",path:"/rites/{principal_id}",desc:"Public, redacted life-event log for a resident.",
  fields:[{k:"principal_id",in:"p",def:"p-silas-crane"}]},
 {g:"Read · town",m:"GET",path:"/elections/{election_id}",desc:"Live election tally.",
  fields:[{k:"election_id",in:"p",def:"elec-council-2035"}]},
 {g:"Read · self",m:"GET",path:"/openapi.json",desc:"Machine-readable OpenAPI 3.1 spec of every path."},
 // ---- WRITE ----
 {g:"Write · onboarding",m:"POST",path:"/institutions/register",desc:"Self-serve a role-scoped API key (sandbox).",
  body:'{ "name": "My PD", "role": "police" }'},
 {g:"Write · registrar",m:"POST",path:"/principals",desc:"Create a resident. Returns principal_id + principal_key (the kill switch).",
  headers:[{k:"X-API-Key",def:SEED.reg}],body:'{ "name": "Rae Fenn" }'},
 {g:"Write · registrar",m:"POST",path:"/agents",desc:"Create an agent.",
  headers:[{k:"X-API-Key",def:SEED.reg}],body:'{ "name": "Rae\'s agent" }'},
 {g:"Write · registrar",m:"POST",path:"/bindings",desc:"Bind an agent to a principal (sprawl cap applies).",
  headers:[{k:"X-API-Key",def:SEED.reg}],body:'{ "agent_id": "<from /agents>", "principal_id": "<from /principals>" }'},
 {g:"Write · registrar",m:"POST",path:"/births",desc:"Spawn a minor + natal agent under regents with a spend cap.",
  headers:[{k:"X-API-Key",def:SEED.reg}],body:'{ "name": "Baby Finch", "regent_agent_ids": ["a-ada-01"], "spend_cap": 25 }'},
 {g:"Write · registrar",m:"POST",path:"/immigrate",desc:"Register a resident + agent (like issuing a driver\'s licence).",
  headers:[{k:"X-API-Key",def:SEED.reg}],body:'{ "name": "Vic Marsh" }'},
 {g:"Write · attestations",m:"POST",path:"/attestations",desc:"An institution writes a civic fact (role-checked). e.g. hospital declare_incapacitated, court sentence, police flag_rogue, coroner death.",
  headers:[{k:"X-API-Key",def:SEED.police}],body:'{ "principal_id": "-", "event": "flag_rogue", "detail": { "agent_id": "a-shadow-99" } }'},
 {g:"Write · rights",m:"DELETE",path:"/bindings/{binding_id}",desc:"The kill switch — a human severs their own agent instantly.",
  fields:[{k:"binding_id",in:"p",def:"b-ada"}],headers:[{k:"X-Principal-Key",def:"<p-ada-marsh key>"}]},
 {g:"Write · civic",m:"POST",path:"/vote",desc:"Cast one resident\'s ballot (one living adult, one vote).",
  body:'{ "election_id": "elec-council-2035", "agent_id": "<your agent>", "candidate": "Owen Brook" }'},
 {g:"Write · estate",m:"POST",path:"/wills",desc:"Register a will naming an heir (principal key or registrar).",
  headers:[{k:"X-API-Key",def:SEED.reg}],body:'{ "principal_id": "<pid>", "heir_principal_id": "p-mara-vale", "inherit_days": 30, "categories": ["estate","family_support"] }'},
 {g:"Write · estate",m:"POST",path:"/contest",desc:"Lazarus — contest a wrongful death within 72h with the principal key.",
  body:'{ "principal_id": "<pid>", "principal_key": "<pk>" }'},
];
const CATS=["financial","commerce","legal","medical","family_support","estate","civic","social"];

// build sidebar
const list=document.getElementById("oplist");
let html="", lastG="";
OPS.forEach((op,i)=>{
  if(op.g!==lastG){ html+=`<div class="grp">${op.g}</div>`; lastG=op.g; }
  html+=`<div class="op" data-i="${i}"><span class="m ${op.m}">${op.m}</span><span class="pth">${op.path}</span></div>`;
});
list.innerHTML=html;
list.querySelectorAll(".op").forEach(el=>el.addEventListener("click",()=>select(+el.dataset.i)));

function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
let cur=null;
function select(i){
  cur=OPS[i];
  document.querySelectorAll(".op").forEach(e=>e.classList.toggle("sel",+e.dataset.i===i));
  const f=cur.fields||[], h=cur.headers||[];
  let fields="";
  f.forEach(x=>{
    const lab=`<label>${x.k} <span class="tag">(${x.in==="p"?"path":"query"})</span></label>`;
    if(x.type==="cat")
      fields+=`<div class="field">${lab}<select data-f="${x.k}">${["(none)"].concat(CATS).map(c=>`<option value="${c==="(none)"?"":c}" ${c===x.def?"selected":""}>${c}</option>`).join("")}</select></div>`;
    else
      fields+=`<div class="field">${lab}<input data-f="${x.k}" value="${esc(x.def||"")}" placeholder="${esc(x.ph||"")}"></div>`;
  });
  h.forEach(x=> fields+=`<div class="field"><label>${x.k} <span class="tag">(header)</span></label><input data-h="${x.k}" value="${esc(x.def||"")}"></div>`);
  if(cur.body!=null)
    fields+=`<div class="field"><label>request body <span class="tag">(JSON)</span></label><textarea data-body>${esc(cur.body)}</textarea></div>`;
  document.getElementById("main").innerHTML=`
    <div class="req-head"><span class="m ${cur.m}">${cur.m}</span><span class="url" id="urlprev">${cur.path}</span></div>
    <div class="desc">${cur.desc}${cur.note?` <em style="color:var(--gold-dim)">— ${cur.note}</em>`:""}</div>
    <div class="fields">${fields||'<div class="hint" style="margin:0">No parameters.</div>'}</div>
    <div class="runbar"><button id="run">▶ Run</button><span class="status" id="status"></span></div>
    <div class="curl" id="curl"></div>
    <div id="respWrap"></div>`;
  document.getElementById("run").addEventListener("click",run);
  document.getElementById("main").addEventListener("input",preview);
  preview();
}

function collect(){
  const main=document.getElementById("main");
  let path=cur.path, query=[], headers={"Content-Type":"application/json"}, body=null;
  main.querySelectorAll("[data-f]").forEach(el=>{
    const k=el.dataset.f, v=el.value.trim(), spec=(cur.fields||[]).find(x=>x.k===k);
    if(spec.in==="p") path=path.replace(`{${k}}`, encodeURIComponent(v||`{${k}}`));
    else if(v) query.push(`${k}=${encodeURIComponent(v)}`);
  });
  main.querySelectorAll("[data-h]").forEach(el=>{ if(el.value.trim()) headers[el.dataset.h]=el.value.trim(); });
  const bodyEl=main.querySelector("[data-body]"); if(bodyEl) body=bodyEl.value;
  const url=path+(query.length?`?${query.join("&")}`:"");
  return {url,headers,body};
}
function preview(){
  if(!cur) return;
  const {url,headers,body}=collect();
  document.getElementById("urlprev").textContent=url;
  let c=`<b>curl</b> -X ${cur.m} "${BASE}${url}"`;
  Object.entries(headers).forEach(([k,v])=>{ if(k!=="Content-Type"||body) c+=` \\\n  -H '${k}: ${v}'`; });
  if(body) c+=` \\\n  -d '${body.replace(/\s+/g," ")}'`;
  document.getElementById("curl").innerHTML=c;
}
async function run(){
  const {url,headers,body}=collect();
  const btn=document.getElementById("run"), st=document.getElementById("status");
  btn.disabled=true; st.textContent="running…";
  const t0=performance.now();
  let res, txt, ct;
  try{
    const opt={method:cur.m,headers};
    if(body && cur.m!=="GET") opt.body=body;
    res=await fetch(BASE+url,opt);
    ct=res.headers.get("content-type")||""; txt=await res.text();
  }catch(e){ st.innerHTML=`<b class="no">network error</b> ${esc(e.message)}`; btn.disabled=false; return; }
  const ms=Math.round(performance.now()-t0);
  const okc=res.ok?"ok":"no";
  st.innerHTML=`<b class="${okc}">${res.status} ${res.statusText}</b> · ${ms} ms · ${esc(ct.split(";")[0])}`;
  let bodyHtml;
  if(ct.includes("json")){
    try{ bodyHtml=hljson(JSON.parse(txt)); }catch{ bodyHtml=esc(txt); }
  } else { bodyHtml=esc(txt.length>4000?txt.slice(0,4000)+"\n…(truncated)":txt); }
  document.getElementById("respWrap").innerHTML=
    `<div class="resp"><div class="resp-head"><span>RESPONSE</span><span>${res.status}</span><span>${ms} ms</span></div>
     <pre class="body">${bodyHtml}</pre></div>`;
  btn.disabled=false;
}
// tiny JSON syntax highlighter
function hljson(o){
  const j=JSON.stringify(o,null,2);
  return esc(j).replace(/"(\\.|[^"\\])*"(\s*:)?/g,(m,_,colon)=>
      colon?`<span class="k">${m}</span>`:`<span class="s">${m}</span>`)
    .replace(/\b(true|false|null)\b/g,'<span class="b">$1</span>')
    .replace(/: (-?\d+\.?\d*)/g,': <span class="n">$1</span>');
}
select(0);
</script>
</body>
</html>
